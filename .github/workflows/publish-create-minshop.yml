name: Publish create-minshop

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: create-minshop

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify release tag
        run: |
          expected="v$(node -p 'require("./package.json").version')"
          test "$GITHUB_REF_NAME" = "$expected"

      - name: Test package
        run: npm run check

      - name: Publish package
        run: npm publish
