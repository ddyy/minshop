name: Verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json

      - name: Install storefront dependencies
        run: npm ci

      - name: Install MCP dependencies
        run: npm ci --prefix mcp

      - name: Create isolated Wrangler configuration
        run: |
          sed \
            -e 's/__NAME__/minshop-check/g' \
            -e 's/__DB_NAME__/minshop-check-db/g' \
            -e 's/__DB_ID__/00000000-0000-0000-0000-000000000000/g' \
            -e 's/__BUCKET__/minshop-check-images/g' \
            wrangler.template.jsonc > wrangler.jsonc

      - name: Run complete verification
        run: npm run verify
